name: Tier 1

# Static and unit verification per docs/decisions/0001-ci-verification-strategy.md.
# Runs on every pull request and every push to main. Target wall-clock
# budget: < 7 minutes (timeout-minutes is set looser as a safety net).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tier1-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0

jobs:
  tier1:
    name: Build / test / lint / doc (windows-2025)
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tier1

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets --target x86_64-pc-windows-msvc -- -D warnings

      - name: cargo build --release --all-targets
        run: cargo build --release --target x86_64-pc-windows-msvc --all-targets

      - name: cargo test
        run: cargo test --target x86_64-pc-windows-msvc --all-targets

      - name: cargo doc --no-deps --document-private-items
        run: cargo doc --no-deps --document-private-items --target x86_64-pc-windows-msvc
        env:
          RUSTDOCFLAGS: -D warnings

      - name: No `static mut` in src/
        # Enforces the "No global state" development principle in
        # CLAUDE.md. The grep exits 0 when no matches are found
        # (success); we invert and fail loudly if a match appears.
        shell: bash
        run: |
          if git grep -nE 'static[[:space:]]+mut' -- src/; then
            echo "::error::\`static mut\` found in src/ — see CLAUDE.md (No global state)."
            exit 1
          fi
