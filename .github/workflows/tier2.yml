name: Tier 2

# DLL and COM ABI verification per
# docs/decisions/0001-ci-verification-strategy.md § Tier 2.
# Runs on every pull request and every push to main. Target
# wall-clock budget: < 10 minutes.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tier2-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0

jobs:
  tier2:
    name: ABI + signing verification (windows-2025)
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tier2

      - name: Set up MSVC developer command prompt (puts dumpbin / signtool on PATH)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build all example cdylibs (release)
        run: |
          cargo build --release --target x86_64-pc-windows-msvc --example passthrough
          cargo build --release --target x86_64-pc-windows-msvc --example gain
          cargo build --release --features aec --target x86_64-pc-windows-msvc --example aec_scaffold

      - name: Generate ad-hoc test code-signing certificate
        shell: pwsh
        run: |
          # New-SelfSignedCertificate parks the cert in
          # Cert:\CurrentUser\My; signtool /sha1 references it by
          # thumbprint. The cert is ephemeral to this job — the
          # runner is destroyed at job end — so the lack of a real
          # root chain is intentional.
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=tympan-apo-tier2-test" `
            -KeyUsage DigitalSignature `
            -CertStoreLocation Cert:\CurrentUser\My `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -NotAfter (Get-Date).AddDays(30)
          Add-Content -Path $env:GITHUB_ENV -Value "CERT_THUMBPRINT=$($cert.Thumbprint)"
          Add-Content -Path $env:GITHUB_ENV -Value "CERT_SUBJECT=$($cert.Subject)"
          Write-Output "Generated test cert: $($cert.Subject) ($($cert.Thumbprint))"

      - name: Verify passthrough.dll
        shell: pwsh
        run: |
          .\.github\scripts\verify-cdylib.ps1 `
            -DllPath "target\x86_64-pc-windows-msvc\release\examples\passthrough.dll" `
            -CertThumbprint $env:CERT_THUMBPRINT `
            -CertSubject $env:CERT_SUBJECT

      - name: Verify gain.dll
        shell: pwsh
        run: |
          .\.github\scripts\verify-cdylib.ps1 `
            -DllPath "target\x86_64-pc-windows-msvc\release\examples\gain.dll" `
            -CertThumbprint $env:CERT_THUMBPRINT `
            -CertSubject $env:CERT_SUBJECT

      - name: Verify aec_scaffold.dll
        shell: pwsh
        run: |
          .\.github\scripts\verify-cdylib.ps1 `
            -DllPath "target\x86_64-pc-windows-msvc\release\examples\aec_scaffold.dll" `
            -CertThumbprint $env:CERT_THUMBPRINT `
            -CertSubject $env:CERT_SUBJECT
