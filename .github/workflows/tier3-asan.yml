name: Tier 3 — AddressSanitizer

# AddressSanitizer-enabled Tier 3 lifecycle run per
# docs/decisions/0001-ci-verification-strategy.md § Tier 3.
# Runs on a daily schedule (one hour after the regular Tier 3) and
# on manual dispatch. ADR 0001 designates this as non-blocking; a
# failure on `main` opens an issue rather than reverting the PR.

on:
  schedule:
    # 07:00 UTC daily — one hour after the regular Tier 3 cron so
    # the cache is warm and we are unlikely to race on test runner
    # capacity with the previous job.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tier3-asan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  CARGO_INCREMENTAL: 0
  # AddressSanitizer flags applied to the Rust compiler. The
  # nightly toolchain plus `-Zbuild-std` rebuilds the standard
  # library against the sanitizer, which is the recommended setup
  # on x86_64-pc-windows-msvc.
  RUSTFLAGS: "-Zsanitizer=address"

jobs:
  tier3-asan:
    name: Lifecycle harness under ASAN (windows-2025, nightly)
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly with rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc
          components: rust-src

      - name: Cache cargo (separate key from regular Tier 3 — ASAN-built std)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tier3-asan

      - name: Build passthrough example cdylib with ASAN (release, -Zbuild-std)
        run: cargo +nightly build -Z build-std --release --target x86_64-pc-windows-msvc --example passthrough

      - name: Run Tier 3 lifecycle test under ASAN
        shell: pwsh
        env:
          TYMPAN_PASSTHROUGH_DLL: ${{ github.workspace }}\target\x86_64-pc-windows-msvc\release\examples\passthrough.dll
          # ASAN runtime options: abort on first error, halt-on-error
          # ensures the test process exits non-zero so the CI step
          # fails loudly. detect_stack_use_after_return broadens the
          # detection surface without much extra cost.
          ASAN_OPTIONS: "halt_on_error=1:abort_on_error=1:detect_stack_use_after_return=1"
        run: |
          if (-not (Test-Path $env:TYMPAN_PASSTHROUGH_DLL)) {
            Write-Error "::error::Expected DLL not found at $env:TYMPAN_PASSTHROUGH_DLL"
            exit 1
          }
          cargo +nightly test -Z build-std --release --target x86_64-pc-windows-msvc --test tier3_lifecycle -- --ignored --test-threads=1 --nocapture

      - name: Run realtime-safety test under ASAN (rlib path + assert_no_alloc)
        env:
          ASAN_OPTIONS: "halt_on_error=1:abort_on_error=1:detect_stack_use_after_return=1"
        run: cargo +nightly test -Z build-std --target x86_64-pc-windows-msvc --test realtime_safety -- --nocapture
